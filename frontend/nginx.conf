# ═══════════════════════════════════════════════════════════════════════════
# nginx-конфиг для production frontend-контейнера.
# Отдаёт собранный Vue SPA + проксирует /api/* на backend-сервис.
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen       80;
    server_name  _;
    server_tokens off;

    # Корень со статикой Vue SPA
    root  /usr/share/nginx/html;
    index index.html;

    # Кэш для статических ассетов с хешем в имени (cache-busting)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Не кешировать сам index.html и service-worker
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Reverse proxy на backend (контейнер `app` в docker-compose).
    location /api/ {
        proxy_pass         http://app:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Большие multipart-загрузки (фото свалок, документы полигонов)
        client_max_body_size 50M;
    }

    # SPA-fallback: любой неизвестный путь → отдаём index.html,
    # Vue Router сам разрулит маршрут.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Скрываем .ht-файлы и т.п. артефакты
    location ~ /\. {
        deny all;
    }

    # Безопасные заголовки
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
