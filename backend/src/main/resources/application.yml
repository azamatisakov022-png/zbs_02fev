spring:
  application:
    name: eco-operator

  datasource:
    url: jdbc:postgresql://localhost:5433/eco_operator
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000    # 1 hour
  refresh-token-expiration: 604800000 # 7 days

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:eco-operator}

payment:
  accounts:
    utilization-fee:
      recipient: "ГП «Эко Оператор» при МПРЭТН КР"
      bank: "РСК Банк"
      account: "1280021000000730"
      bik: "128001"
      inn: "02109202010072"
    penalty:
      recipient: "Центральное казначейство КР"
      bank: "Национальный банк КР"
      account: "4402013100100330"
      bik: "440001"

calculation:
  penalty:
    daily-rate: 0.0009   # 0.09% в день — ставка пени за просрочку

integration:
  default-timeout: 10000
  tax-service:
    base-url: ${TAX_SERVICE_URL:http://localhost:8090/api/v1}
    api-key: ${TAX_SERVICE_API_KEY:stub-key}
    timeout: 15000
    enabled: true
  customs-service:
    base-url: ${CUSTOMS_SERVICE_URL:http://localhost:8091/api/v1}
    api-key: ${CUSTOMS_SERVICE_API_KEY:stub-key}
    timeout: 15000
    enabled: true
  banking:
    base-url: ${BANK_SERVICE_URL:http://localhost:8092/api/v1}
    api-key: ${BANK_SERVICE_API_KEY:stub-key}
    timeout: 20000
    eco-operator-account: "1280021000000730"
    eco-operator-bik: "128001"
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
