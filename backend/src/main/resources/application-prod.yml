spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:eco_operator}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:eco-operator}

integration:
  tax-service:
    base-url: ${TAX_SERVICE_URL}
    api-key: ${TAX_SERVICE_API_KEY}
  customs-service:
    base-url: ${CUSTOMS_SERVICE_URL}
    api-key: ${CUSTOMS_SERVICE_API_KEY}
  banking:
    base-url: ${BANK_SERVICE_URL}
    api-key: ${BANK_SERVICE_API_KEY}
    eco-operator-account: ${ECO_OPERATOR_ACCOUNT}
    eco-operator-bik: ${ECO_OPERATOR_BIK}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    kg.eco.operator: INFO
    kg.eco.operator.integration: INFO
    org.springframework.security: WARN
